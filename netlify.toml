[build]
  command = "npm run build"
  publish = "_site"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Decap CMS OAuth ("Decap Bridge") endpoints
[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/callback"
  to = "/.netlify/functions/callback"
  status = 200

# SPA-style fallback not needed (Eleventy outputs static HTML per route),
# but keep a 404 page fallback if you add one later.
